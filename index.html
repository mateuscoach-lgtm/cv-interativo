<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CV Interativo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: linear-gradient(135deg, #f5f1ed 0%, #ede6df 100%);
  color: #5a4a42;
  font-family: Arial, sans-serif;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255, 252, 248, 0.95);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(210, 190, 170, 0.3);
  padding: 20px;
  margin: 12px 0;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(139, 90, 43, 0.08);
}

/* TEXTOS */
h1, h2 {
  color: #6b4423;
  font-weight: 600;
}

p {
  color: #8b7355;
}

/* BOTÕES */
.btn {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  margin-right: 10px;
  transition: 0.2s;
}

.whats {
  background: #a8d5ba;
  color: #4a5f4a;
}

.whats:hover {
  background: #8fc5a3;
}

.linkedin {
  background: #d4a5a5;
  color: #5a3a3a;
}

.linkedin:hover {
  background: #c48989;
}

/* EXPERIÊNCIA */
.exp {
  padding: 14px;
  margin: 10px 0;
  background: rgba(245, 235, 220, 0.8);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid transparent;
  color: #5a4a42;
}

.exp:hover {
  border: 1px solid rgba(180, 140, 100, 0.4);
  background: rgba(240, 225, 205, 0.9);
}

.exp.active {
  border: 1px solid #b8956a;
  background: rgba(184, 149, 106, 0.15);
  color: #6b4423;
  font-weight: 600;
}

/* RESULTADOS */
.result {
  background: rgba(184, 149, 106, 0.15);
  color: #6b4423;
  padding: 10px 12px;
  margin: 6px;
  border-radius: 10px;
  display: inline-block;
  border: 1px solid rgba(184, 149, 106, 0.3);
  font-weight: 500;
}

/* SKILLS */
.skill {
  display: inline-block;
  padding: 8px 10px;
  margin: 5px;
  background: rgba(220, 200, 170, 0.4);
  border-radius: 8px;
  font-size: 13px;
  color: #5a4a42;
  border: 1px solid rgba(184, 149, 106, 0.2);
}

.skill.main {
  background: rgba(168, 213, 186, 0.3);
  color: #4a5f4a;
  border: 1px solid rgba(168, 213, 186, 0.5);
  font-weight: 600;
}

canvas {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1 id="nome"></h1>
<p id="titulo"></p>

<button class="btn whats" onclick="zap()">WhatsApp</button>
<button class="btn linkedin" onclick="linkedin()">LinkedIn</button>
</div>

<div class="card">
<h2>Experiência</h2>
<div id="exp"></div>
</div>

<div class="card">
<h2>Resultados</h2>
<div id="res"></div>
</div>

<div class="card">
<h2>Skills</h2>
<div id="skills"></div>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h2>Comparação entre experiências</h2>
<canvas id="compare"></canvas>
</div>

<div class="card">
<h2>Evolução no tempo</h2>
<canvas id="timeline"></canvas>
</div>

<div class="card">
<h2>Ranking de Skills</h2>
<canvas id="ranking"></canvas>
</div>

</div>

<script>

let dados;
let chart;

async function load(){

 const r = await fetch("https://cv-interativo.onrender.com/cv");
 dados = await r.json();

 document.getElementById("nome").innerText = dados.nome;
 document.getElementById("titulo").innerText = dados.titulo;

 dados.experiencias.forEach(e=>{
  let d=document.createElement("div");
  d.className="exp";
  d.innerText=e.empresa + " ("+e.periodo+")";
  d.onclick=()=>select(e,d);
  document.getElementById("exp").appendChild(d);
 });

 buildCompare();
 buildTimeline();
 buildRanking();

 setTimeout(() => {
   const first = document.querySelector(".exp");
   if (first) first.click();
 }, 300);
}

function select(e,el){

 document.querySelectorAll(".exp").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");

 let res = dados.resultados.filter(r=>r.relacionados.includes(e.id));

 let rdiv=document.getElementById("res");
 rdiv.innerHTML="";
 res.forEach(x=>{
  let d=document.createElement("div");
  d.className="result";
  d.innerText=x.nome;
  rdiv.appendChild(d);
 });

 let sdiv=document.getElementById("skills");
 sdiv.innerHTML="";

 e.skills.forEach(s=>{
  let d=document.createElement("div");
  d.className="skill";

  if(s=="Gestão") d.classList.add("main");

  d.innerText=s;
  sdiv.appendChild(d);
 });

 if(chart) chart.destroy();

 chart = new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{
    labels:e.skills,
    datasets:[{
      label:"Skills",
      data:e.skills.map(()=>Math.random()*5),
      backgroundColor: [
        'rgba(184, 149, 106, 0.8)',
        'rgba(212, 165, 165, 0.8)',
        'rgba(168, 213, 186, 0.8)',
        'rgba(220, 200, 170, 0.8)',
        'rgba(200, 170, 150, 0.8)',
        'rgba(190, 160, 140, 0.8)',
      ],
      borderColor: [
        'rgb(184, 149, 106)',
        'rgb(212, 165, 165)',
        'rgb(168, 213, 186)',
        'rgb(220, 200, 170)',
        'rgb(200, 170, 150)',
        'rgb(190, 160, 140)',
      ],
      borderWidth: 1
    }]
  }
 });
}

function buildCompare(){
 new Chart(document.getElementById("compare"),{
  type:"bar",
  data:{
    labels:dados.experiencias.map(e=>e.empresa),
    datasets:[{
      label:"Qtd Skills",
      data:dados.experiencias.map(e=>e.skills.length),
      backgroundColor: 'rgba(184, 149, 106, 0.8)',
      borderColor: 'rgb(184, 149, 106)',
      borderWidth: 1
    }]
  }
 });
}

function buildTimeline(){
 new Chart(document.getElementById("timeline"),{
  type:"line",
  data:{
    labels:dados.experiencias.map(e=>e.periodo),
    datasets:[{
      label:"Evolução",
      data:[1,2,3,4],
      borderColor: 'rgb(184, 149, 106)',
      backgroundColor: 'rgba(184, 149, 106, 0.1)',
      borderWidth: 2,
      fill: true
    }]
  }
 });
}

function buildRanking(){

 let count = {};

 dados.experiencias.forEach(e=>{
  e.skills.forEach(s=>{
    count[s]=(count[s]||0)+1;
  });
 });

 new Chart(document.getElementById("ranking"),{
  type:"bar",
  data:{
    labels:Object.keys(count),
    datasets:[{
      label:"Ranking",
      data:Object.values(count),
      backgroundColor: [
        'rgba(184, 149, 106, 0.8)',
        'rgba(212, 165, 165, 0.8)',
        'rgba(168, 213, 186, 0.8)',
        'rgba(220, 200, 170, 0.8)',
        'rgba(200, 170, 150, 0.8)',
        'rgba(190, 160, 140, 0.8)',
      ],
      borderColor: [
        'rgb(184, 149, 106)',
        'rgb(212, 165, 165)',
        'rgb(168, 213, 186)',
        'rgb(220, 200, 170)',
        'rgb(200, 170, 150)',
        'rgb(190, 160, 140)',
      ],
      borderWidth: 1
    }]
  }
 });
}

function zap(){

 fetch("https://cv-interativo.onrender.com/track-click", {
  method: "POST",
  headers: {"Content-Type":"application/json"},
  body: JSON.stringify({origem:"whatsapp"})
 });

 window.open("https://wa.me/5515991290379");
}

function linkedin(){

 fetch("https://cv-interativo.onrender.com/track-click", {
  method: "POST",
  headers: {"Content-Type":"application/json"},
  body: JSON.stringify({origem:"linkedin"})
 });

 window.open("https://www.linkedin.com/in/mateus-renato-k-silva");
}

load();

</script>

</body>
</html>
